<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="chipGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Base with transparent outside -->
  <rect x="0" y="0" width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Playing Card -->
  <g transform="translate(130, 120) rotate(-12)" filter="url(#shadow)">
    <!-- Card Body -->
    <rect x="0" y="0" width="160" height="230" rx="16" fill="url(#cardGrad)" stroke="#ffffff" stroke-width="4"/>
    <rect x="12" y="12" width="136" height="206" rx="8" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <!-- Diamond Shape -->
    <path d="M 80 80 L 110 115 L 80 150 L 50 115 Z" fill="#ffffff" />
  </g>

  <!-- Poker Chip -->
  <g transform="translate(340, 330)" filter="url(#shadow)">
    <!-- Outer -->
    <circle cx="0" cy="0" r="110" fill="url(#chipGrad)" stroke="#ffffff" stroke-width="4"/>
    <!-- Dashes -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#ffffff" stroke-width="20" stroke-dasharray="32 20"/>
    <!-- Inner -->
    <circle cx="0" cy="0" r="55" fill="#991b1b"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#ffffff" stroke-width="4"/>
    <path d="M 0 -15 L 4 -4 L 15 -4 L 6 3 L 9 14 L 0 7 L -9 14 L -6 3 L -15 -4 L -4 -4 Z" fill="#ffffff" />
  </g>
</svg>
